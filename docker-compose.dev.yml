services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3020:3020"
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    entrypoint: []
    command: php artisan serve --host=0.0.0.0 --port=3020
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:3020
      LOG_CHANNEL: stack
      LOG_LEVEL: debug
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: wallet
      DB_USERNAME: wallet
      DB_PASSWORD: secret

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: wallet
      MYSQL_USER: wallet
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
