version: "3.8"

services:
  app:
    image: smart_wallet_app:latest
    networks:
      - traefik_public
    environment:
      APP_NAME: "Smart Wallet"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: "https://marcelodlg.com.br"
      SESSION_SECURE_COOKIE: "true"
      APP_KEY: "base64:rPqEd0c2CMV2dQOvcHC1hxjf6YTfQnzZooipmQDjXXI="
      LOG_CHANNEL: json
      LOG_LEVEL: info
      DB_CONNECTION: mysql
      DB_HOST: "187.87.80.22"
      DB_PORT: "3306"
      DB_DATABASE: "db_teste"
      DB_USERNAME: "root"
      DB_PASSWORD: "AA88xk62"
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "0.2"
          memory: 512M
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.services.smart_wallet.loadbalancer.server.port=3020"
        - "traefik.http.routers.smart_wallet.rule=Host(`marcelodlg.com.br`) || Host(`www.marcelodlg.com.br`)"
        - "traefik.http.routers.smart_wallet.entrypoints=websecure"
        - "traefik.http.routers.smart_wallet.tls=true"
        - "traefik.http.routers.smart_wallet.tls.certresolver=le"
        - "traefik.http.routers.smart_wallet.tls.domains[0].main=marcelodlg.com.br"
        - "traefik.http.routers.smart_wallet.tls.domains[0].sans=www.marcelodlg.com.br"
        - "traefik.http.routers.smart_wallet.service=smart_wallet"
        - "traefik.http.routers.smart_wallet_http.rule=Host(`marcelodlg.com.br`) || Host(`www.marcelodlg.com.br`)"
        - "traefik.http.routers.smart_wallet_http.entrypoints=web"
        - "traefik.http.routers.smart_wallet_http.middlewares=smart_wallet_redirect_https"
        - "traefik.http.middlewares.smart_wallet_redirect_https.redirectscheme.scheme=https"
        - "traefik.http.middlewares.smart_wallet_redirect_https.redirectscheme.permanent=true"

networks:
  traefik_public:
    external: true
