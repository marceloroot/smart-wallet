services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    ports:
      - "8000:8000"

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

    environment:
      APP_ENV: local
      APP_DEBUG: true
      APP_KEY: base64:2SNUUMwK38ZeITR/XoKvBEfGbimraTayo7AXiggHGnk=

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: wallet
      DB_USERNAME: wallet
      DB_PASSWORD: secret

    command: >
      sh -c "
      composer install &&
      php artisan optimize:clear &&
      php artisan migrate --seed &&
      php artisan serve --host=0.0.0.0 --port=8000
      "

  mysql:
    image: mysql:8.0

    ports:
      - "3306:3306"

    environment:
      MYSQL_DATABASE: wallet
      MYSQL_USER: wallet
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
